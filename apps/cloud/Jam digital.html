<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Jam Awan</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CLOUD */
.cloud {
  position: relative;
}

/* CONTAINER (DRAG + RESIZE) */
.cloud-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 150px;
  cursor: move;
}

.resize-handle {
  width: 15px;
  height: 15px;
  background:transparent;
  position: absolute;
  right: -5px;
  bottom: -5px;
  cursor: se-resize;
  border-radius: 3px;
}

/* SHAPE */
.cloud-shape {
  width: 280px;
  height: 100px;
 background: linear-gradient(135deg, #22d3ee, #3b82f6);
  border-radius: 60px;
  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;

  box-shadow: 0 10px 30px rgba(0,229,255,0.5);

}

/* bulat kiri */
.cloud-shape::before {
  content: "";
  position: absolute;
  width: 140px;
  height: 110px;
  background: linear-gradient(135deg, #33dad1, #3b82f6);
  
  border-radius: 50%;
  top: -70px;
  left: 50px;
  filter: blur(3px);
}

/* bulat kanan */
.cloud-shape::after {
  content: "";
  position: absolute;
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #32bad1, #2b82f6);
  border-radius: 50%;
  top: -40px;
  right: 50px;
  filter: blur(3px);
}

.cloud:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

/* CLOCK */
#clock {
  font-size: 2rem;
  font-weight: bold;
  color: #0f172a;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.visualizer {
  display: flex;
  gap: 5px;
  justify-content: center;
  margin-top: -1px;
}

.visualizer span {
  width: 8px;
  height: 20px;
  border-radius: 5px;
  animation: bounce 1s infinite ease-in-out, colorChange 5s infinite alternate;
}

/* delay supaya bars tak seragam */
.visualizer span:nth-child(1) { animation-delay: 0s, 0s; }
.visualizer span:nth-child(2) { animation-delay: 0.2s, 0.2s; }
.visualizer span:nth-child(3) { animation-delay: 0.4s, 0.4s; }
.visualizer span:nth-child(4) { animation-delay: 0.6s, 0.6s; }
.visualizer span:nth-child(5) { animation-delay: 0.8s, 0.8s; }
.visualizer span:nth-child(6) { animation-delay: 0.6s, 0.10s; }
.visualizer span:nth-child(7) { animation-delay: 0.4s, 0.12s; }
.visualizer span:nth-child(8) { animation-delay: 0.2s, 0.14s; }

@keyframes bounce {
  0%, 100% { height: 20px; }
  50% { height: 60px; }
}

@keyframes colorChange {
  0% { background: #00e5ff; }
  12.5% { background: #ff3c00; }
  25% { background: #ffdd00; }
  37.5% { background: #6bff00; }
  62.5% { background: #00e5ff; }
    75% { background: #6bff00; }
      87.5% { background: #ff00ff; }
        100% { background: #00e5ff; }
}
</style>

</head>
<body>
<div class="cloud-box"></div>
<div class="cloud">
  <div class="cloud-shape">
    <div id="clock"></div>
  </div>
  <div class="visualizer">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>
<div class="resize-handle"></div>
</div>



<script>
function Clock() {
  const now = new Date();
  let hours = String(now.getHours()).padStart(2, '0');
  let minutes = String(now.getMinutes()).padStart(2, '0');
  let seconds = String(now.getSeconds()).padStart(2, '0');

  document.getElementById('clock').textContent =
    `${hours}:${minutes}:${seconds}`;
}

setInterval(Clock, 1000);
Clock();

const box = document.querySelector(".cloud-box");
let isDragging = false, offsetX, offsetY;

box.addEventListener("mousedown", (e) => {
  if (e.target.classList.contains("resize-handle")) return;
  isDragging = true;
  offsetX = e.clientX - box.offsetLeft;
  offsetY = e.clientY - box.offsetTop;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  box.style.left = e.clientX - offsetX + "px";
  box.style.top = e.clientY - offsetY + "px";
  box.style.transform = "none";
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// RESIZE
const handle = document.querySelector(".resize-handle");
let isResizing = false;

handle.addEventListener("mousedown", () => {
  isResizing = true;
});

document.addEventListener("mousemove", (e) => {
  if (!isResizing) return;
  box.style.width = e.clientX - box.offsetLeft + "px";
  box.style.height = e.clientY - box.offsetTop + "px";
});

document.addEventListener("mouseup", () => {
  isResizing = false;
});
</script>

</body>
</html>
