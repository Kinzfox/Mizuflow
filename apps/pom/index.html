<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquid Pomodoro</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2ab6af">

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
  <div class="app">
    <div class="water_wave" id="water">
      <div class="wave" id="wave1"></div>
      <div class="wave wave2" id="wave2"></div>

      <div class="time bungee-regular" id="time">25:00</div>

      <button id="mainBtn" class="main-btn">
        <span class="material-symbols-outlined" id="btnIcon">play_arrow</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
